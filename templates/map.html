<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map – Aashiyana</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    /* Full-height map */
    .map-wrap  { position: relative; height: calc(100vh - var(--nav-h)); overflow: hidden; }
    #map       { width: 100%; height: 100%; }

    /* Move +/- to bottom-left */
    .leaflet-top.leaflet-left    { display: none; }
    .leaflet-bottom.leaflet-left { bottom: 1.5rem; left: 1rem; }

    /* ── Glass filter panel ── */
    .filter-panel {
      position: absolute;
      top: 1rem; left: 5rem;
      z-index: 700;
      display: none;                             /* shown after zoom lands */
      flex-direction: column;
      gap: 0.55rem;
      min-width: 210px; max-width: 235px;
      background: rgba(10, 10, 28, 0.80);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(201,152,42,0.35);
      border-radius: 14px;
      padding: 0.85rem 1rem;
      box-shadow: 0 6px 28px rgba(0,0,0,0.5);
    }
    .fp-title  {
      font-size: 0.65rem; font-weight: 900;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: #C9982A; margin-bottom: 0.1rem;
    }
    .fp-label  {
      font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.4px;
      color: rgba(200,200,230,0.65); margin-bottom: 2px; display: block;
    }
    .fp-select {
      width: 100%; padding: 0.4rem 0.6rem;
      border-radius: 8px; border: 1px solid rgba(201,152,42,0.28);
      background: rgba(255,255,255,0.07); color: #fff;
      font-size: 0.8rem; font-family: 'DM Sans', sans-serif;
      outline: none; cursor: pointer;
    }
    .fp-select:focus  { border-color: rgba(201,152,42,0.65); }
    .fp-select option { background: #12122a; color: #fff; }
    .fp-select:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Price result inside panel */
    .fp-result {
      display: none;
      background: rgba(201,152,42,0.12);
      border: 1px solid rgba(201,152,42,0.38);
      border-radius: 10px;
      padding: 0.6rem 0.75rem;
    }
    .fp-result.show { display: block; }
    .fpr-name  { font-size: 0.74rem; font-weight: 700; color: #fff; margin-bottom: 0.18rem; line-height: 1.3; }
    .fpr-price { font-size: 1.2rem;  font-weight: 900; color: #C9982A; line-height: 1; }
    .fpr-sub   { font-size: 0.67rem; color: rgba(255,255,255,0.45); margin-top: 0.15rem; }

    /* Reset button */
    .fp-reset {
      align-self: flex-start; padding: 0.3rem 0.75rem;
      font-size: 0.74rem; font-weight: 700;
      border-radius: 8px; border: 1px solid rgba(201,152,42,0.38);
      background: rgba(201,152,42,0.1); color: #C9982A;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: background 0.2s;
    }
    .fp-reset:hover { background: rgba(201,152,42,0.25); }

    /* ── Legend ── */
    .map-legend {
      position: absolute; bottom: 1.5rem; right: 1rem; z-index: 700;
      background: rgba(10,10,28,0.80); backdrop-filter: blur(12px);
      border: 1px solid rgba(201,152,42,0.25); border-radius: 12px;
      padding: 0.7rem 0.95rem; color: #fff; font-size: 0.72rem; min-width: 115px;
    }
    .leg-title { font-weight: 800; color: #C9982A; font-size: 0.68rem;
                 text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.45rem; }
    .leg-row   { display: flex; align-items: center; gap: 0.45rem; margin-bottom: 0.28rem; }
    .leg-dot   { width: 11px; height: 11px; border-radius: 50%;
                 border: 1.5px solid rgba(255,255,255,0.2); flex-shrink: 0; }

    /* ── Loading overlay ── */
    .overlay {
      position: absolute; inset: 0; z-index: 900;
      background: rgba(8,8,22,0.75); backdrop-filter: blur(6px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem; color: #fff;
      transition: opacity 0.8s ease;
    }
    .overlay.fade { opacity: 0; pointer-events: none; }
    .ov-spin {
      width: 44px; height: 44px;
      border: 3px solid rgba(201,152,42,0.2);
      border-top-color: #C9982A; border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    .ov-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #C9982A; }
    .ov-sub   { font-size: 0.82rem; color: rgba(255,255,255,0.5); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Custom hover tooltip ── */
    .map-tooltip {
      position: absolute; z-index: 800;
      background: rgba(10,10,28,0.92); backdrop-filter: blur(10px);
      border: 1px solid rgba(201,152,42,0.4); border-radius: 10px;
      padding: 0.55rem 0.85rem; pointer-events: none;
      display: none; white-space: nowrap;
    }
    .map-tooltip.show { display: block; }
    .tt-name  { font-size: 0.82rem; font-weight: 700; color: #C9982A; margin-bottom: 0.15rem; }
    .tt-price { font-size: 0.9rem;  font-weight: 800; color: #fff; }
    .tt-cnt   { font-size: 0.67rem; color: rgba(255,255,255,0.45); margin-top: 0.1rem; }

    /* Leaflet dark popup */
    .leaflet-popup-content-wrapper {
      background: #12122a !important; color: #f0ede8 !important;
      border-radius: 12px !important; border: 1px solid rgba(201,152,42,0.35) !important;
      box-shadow: 0 8px 28px rgba(0,0,0,0.6) !important;
    }
    .leaflet-popup-tip          { background: #12122a !important; }
    .leaflet-popup-close-button { color: #C9982A !important; font-size: 1rem !important; }
    .pu-name  { font-weight: 700; font-size: 0.88rem; color: #C9982A; margin-bottom: 0.25rem; }
    .pu-price { font-size: 1rem; font-weight: 800; color: #fff; }
    .pu-cnt   { font-size: 0.7rem; color: rgba(255,255,255,0.45); margin-top: 0.1rem; }
  </style>
</head>
<body>
<div class="page-body">
<div class="map-wrap">

  <!-- Loading overlay -->
  <div class="overlay" id="overlay">
    <div class="ov-spin"></div>
    <div class="ov-title">Aashiyana</div>
    <div class="ov-sub" id="ov-sub">Loading map…</div>
  </div>

  <!-- Custom hover tooltip (follows mouse) -->
  <div class="map-tooltip" id="tooltip">
    <div class="tt-name"  id="tt-name"></div>
    <div class="tt-price" id="tt-price"></div>
    <div class="tt-cnt"   id="tt-cnt"></div>
  </div>

  <!-- Glass filter panel -->
  <div class="filter-panel" id="filter-panel">
    <div class="fp-title">🗺 Price Map</div>

    <div>
      <span class="fp-label">Sector</span>
      <select class="fp-select" id="sel-sector" onchange="onSectorChange()">
        <option value="">— All Sectors —</option>
      </select>
    </div>

    <div>
      <span class="fp-label">Society</span>
      <select class="fp-select" id="sel-society" onchange="onSocietyChange()" disabled>
        <option value="">— Select sector first —</option>
      </select>
    </div>

    <!-- Price result -->
    <div class="fp-result" id="fp-result">
      <div class="fpr-name"  id="fpr-name"></div>
      <div class="fpr-price" id="fpr-price"></div>
      <div class="fpr-sub"   id="fpr-sub"></div>
    </div>

    <button class="fp-reset" onclick="resetAll()">↺ Reset</button>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Legend -->
  <div class="map-legend">
    <div class="leg-title">₹ / sqft</div>
    <div class="leg-row"><div class="leg-dot" style="background:#3b82f6"></div>&lt; 10</div>
    <div class="leg-row"><div class="leg-dot" style="background:#22c55e"></div>10 – 20</div>
    <div class="leg-row"><div class="leg-dot" style="background:#f59e0b"></div>20 – 40</div>
    <div class="leg-row"><div class="leg-dot" style="background:#ef4444"></div>&gt; 40</div>
  </div>

</div>
</div>

/* ══════════════════════════════════════════════════════════
   COLOUR by ₹/sqft
══════════════════════════════════════════════════════════ */
function pColor(p) {
  if (p < 10) return "#3b82f6";
  if (p < 20) return "#22c55e";
  if (p < 40) return "#f59e0b";
  return "#ef4444";
}

/* Society cache loaded from API after sector select */
let societyCache = {};   /* society → avg_price */

/* All sector markers for reference */
let markers = {};

/* ══════════════════════════════════════════════════════════
   MAP INIT
   Step 1: India view (zoom 5)
   Step 2: After 1 sec → flyTo Gurugram over 5 sec
   Step 3: On arrival → show markers + panel
══════════════════════════════════════════════════════════ */
const GURUGRAM   = [28.457, 77.029];
const INDIA_VIEW = [20.5937, 78.9629];

const map = L.map("map", {
  zoomControl: false,
  center: INDIA_VIEW,
  zoom: 5,
  preferCanvas: true,     /* better performance with many markers */
});

L.control.zoom({ position: "bottomleft" }).addTo(map);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap contributors",
  maxZoom: 19,
}).addTo(map);

/* Update overlay text then start zoom */
setTimeout(() => {
  document.getElementById("ov-sub").textContent = "Zooming into Gurugram…";
  map.flyTo(GURUGRAM, 12, { duration: 5, easeLinearity: 0.2 });
}, 1000);

/* When Gurugram zoom lands → remove overlay, show markers & panel */
let zoomLanded = false;
map.on("moveend", () => {
  if (zoomLanded) return;
  if (map.getZoom() < 10) return;   /* ignore India-level moves */
  zoomLanded = true;

  /* Fade out overlay */
  const ov = document.getElementById("overlay");
  ov.classList.add("fade");
  setTimeout(() => ov.style.display = "none", 800);

  /* Show filter panel & render markers */
  document.getElementById("filter-panel").style.display = "flex";
  renderSectorMarkers();
  populateSectorDropdown();
});

/* ══════════════════════════════════════════════════════════
   HOVER TOOLTIP  (follows mouse over the map container)
══════════════════════════════════════════════════════════ */
const tooltip   = document.getElementById("tooltip");
const mapWrap   = document.querySelector(".map-wrap");

mapWrap.addEventListener("mousemove", e => {
  /* Position tooltip near cursor, keep inside viewport */
  const rect = mapWrap.getBoundingClientRect();
  let x = e.clientX - rect.left + 14;
  let y = e.clientY - rect.top  - 10;
  if (x + 200 > rect.width)  x = e.clientX - rect.left - 180;
  if (y + 100 > rect.height) y = e.clientY - rect.top  - 90;
  tooltip.style.left = x + "px";
  tooltip.style.top  = y + "px";
});

function showTooltip(name, price, cnt) {
  document.getElementById("tt-name").textContent  = capitalize(name);
  document.getElementById("tt-price").textContent = `₹${price} / sqft`;
  document.getElementById("tt-cnt").textContent   = `${cnt} properties`;
  tooltip.classList.add("show");
}
function hideTooltip() { tooltip.classList.remove("show"); }

/* ══════════════════════════════════════════════════════════
   RENDER SECTOR MARKERS
   One circle per sector at its exact coordinate.
   Hover → custom tooltip. Click → zoom + load societies.
══════════════════════════════════════════════════════════ */
const secLayer = L.layerGroup().addTo(map);

function renderSectorMarkers() {
  secLayer.clearLayers();
  markers = {};

  Object.entries(COORDS).forEach(([name, [lat, lng]]) => {
    const price = SECTOR_PRICE[name];
    if (price === undefined) return;  /* no price data → skip */

    const m = L.circleMarker([lat, lng], {
      radius: 10,
      fillColor: pColor(price),
      color: "#fff",
      weight: 2,
      opacity: 1,
      fillOpacity: 0.88,
    });

    /* Hover events → custom tooltip */
    m.on("mouseover", () => showTooltip(name, price, "—"));
    m.on("mouseout",  () => hideTooltip());

    /* Click → select in dropdown, zoom, load societies */
    m.on("click", () => {
      const sel = document.getElementById("sel-sector");
      sel.value = name;
      onSectorChange();
      map.flyTo([lat, lng], 14, { duration: 1.5 });
    });

    m.addTo(secLayer);
    markers[name] = m;
  });
}

/* ══════════════════════════════════════════════════════════
   SECTOR DROPDOWN
══════════════════════════════════════════════════════════ */
function populateSectorDropdown() {
  const sel = document.getElementById("sel-sector");
  /* Sort sectors: special areas first, then "sector N" numerically */
  const special = ["dwarka expressway","gwal pahari","manesar","sohna road"];
  const numbered = Object.keys(COORDS)
    .filter(k => !special.includes(k))
    .sort((a, b) => {
      const na = parseInt(a.replace(/\D/g,"")) || 0;
      const nb = parseInt(b.replace(/\D/g,"")) || 0;
      return na - nb;
    });
  [...special, ...numbered].forEach(name => {
    if (!COORDS[name]) return;
    const o = document.createElement("option");
    o.value = name; o.textContent = capitalize(name);
    sel.appendChild(o);
  });
}

/* ══════════════════════════════════════════════════════════
   SOCIETY DROPDOWN  (populated from Property table via API)
══════════════════════════════════════════════════════════ */
async function loadSocieties(sector) {
  const sel = document.getElementById("sel-society");
  sel.innerHTML = `<option value="">⏳ Loading…</option>`;
  sel.disabled  = true;

  try {
    /* /api/map/societies?sector=… returns [{society, avg_price, count, sector}] */
    const res  = await fetch(`/api/map/societies?sector=${encodeURIComponent(sector)}`);
    const data = await res.json();

    societyCache = {};
    data.forEach(r => { societyCache[r.society] = r; });

    sel.innerHTML = `<option value="">— All Societies —</option>`;
    data.sort((a,b) => a.society.localeCompare(b.society)).forEach(r => {
      const o = document.createElement("option");
      o.value = r.society;
      o.textContent = capitalize(r.society);
      sel.appendChild(o);
    });
    sel.disabled = data.length === 0;
  } catch {
    sel.innerHTML = `<option value="">Error loading</option>`;
  }
}

/* ══════════════════════════════════════════════════════════
   FILTER EVENTS
══════════════════════════════════════════════════════════ */
function onSectorChange() {
  const sector = document.getElementById("sel-sector").value;
  hideResult();

  /* Reset society dropdown */
  const socSel = document.getElementById("sel-society");
  socSel.innerHTML = `<option value="">— Select sector first —</option>`;
  socSel.disabled  = true;

  if (!sector) {
    /* Back to city overview */
    map.flyTo(GURUGRAM, 12, { duration: 1.5 });
    /* Reset all markers to normal size */
    Object.values(markers).forEach(m => m.setRadius(10));
    return;
  }

  /* Fly to selected sector */
  const coords = COORDS[sector];
  if (coords) map.flyTo(coords, 14, { duration: 1.5 });

  /* Highlight selected marker, dim others */
  const price = SECTOR_PRICE[sector] ?? 0;
  Object.entries(markers).forEach(([name, m]) => {
    if (name === sector) {
      m.setRadius(16);
      m.setStyle({ weight: 3, color: "#C9982A" });
    } else {
      m.setRadius(8);
      m.setStyle({ weight: 1, color: "#fff", fillOpacity: 0.4 });
    }
  });

  /* Show sector price immediately in result card */
  showResult(capitalize(sector), price, null, "sector average");

  /* Load society dropdown */
  loadSocieties(sector);
}

function onSocietyChange() {
  const society = document.getElementById("sel-society").value;
  const sector  = document.getElementById("sel-sector").value;
  if (!society) {
    /* Revert to sector result */
    const price = SECTOR_PRICE[sector] ?? 0;
    if (price) showResult(capitalize(sector), price, null, "sector average");
    else hideResult();
    return;
  }
  const d = societyCache[society];
  if (d) showResult(capitalize(society), d.avg_price, d.count, capitalize(sector));
}

/* ══════════════════════════════════════════════════════════
   RESULT CARD inside filter panel
══════════════════════════════════════════════════════════ */
function showResult(name, price, count, sub) {
  document.getElementById("fpr-name").textContent  = name;
  document.getElementById("fpr-price").textContent = `₹${price} / sqft`;
  document.getElementById("fpr-sub").textContent   =
    count !== null ? `${count} listings · ${sub}` : sub;
  document.getElementById("fp-result").classList.add("show");
}
function hideResult() {
  document.getElementById("fp-result").classList.remove("show");
}

/* ══════════════════════════════════════════════════════════
   RESET
══════════════════════════════════════════════════════════ */
function resetAll() {
  document.getElementById("sel-sector").value = "";
  document.getElementById("sel-society").innerHTML =
    `<option value="">— Select sector first —</option>`;
  document.getElementById("sel-society").disabled = true;
  hideResult();
  /* Restore all markers */
  Object.values(markers).forEach(m => {
    m.setRadius(10);
    m.setStyle({ weight: 2, color: "#fff", fillOpacity: 0.88 });
  });
  map.flyTo(GURUGRAM, 12, { duration: 1.5 });
}
</script>
